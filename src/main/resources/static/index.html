<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Streaming Musical</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Cadastro de Músicas</h1>
<p>Cadastre a nova música abaixo:</p>

<div class = "formulario">
    <input class = "form" type="text" id="nome" placeholder="Nome">
    <input class = "form" type="text" id="artista" placeholder="Artista">
    <input class = "form" type="text" id="genero" placeholder="Gênero">
    <input class = "form" type="number" id="duracao" placeholder="Duração">
    <input class = "form" type="number" id="ano" placeholder="Ano">

    <button class = "form" onclick="salvar()">Postar Música</button>
</div>

<div class = "lista">
    <h2>Lista de Músicas</h2>
    <ul id="lista"></ul>
</div>

<script src="script.js"></script>

</body>
</html>
